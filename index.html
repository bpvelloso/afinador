<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0a0f" />
  <meta name="description" content="Afinador de violão profissional - PWA" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Afinador" />
  <link rel="manifest" href="./manifest.json" />
  <title>Afinador de Violão</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@300;400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app">
    <header>
      <h1>AFINADOR</h1>
      <p>Violão Acústico · Standard Tuning</p>
    </header>

    <div id="install-banner">⬇ Instalar como app</div>

    <!-- MAIN DISPLAY -->
    <div class="main-display">
      <div class="note-display">
        <div class="note-name" id="note-name">—</div>
        <div class="freq-display">Detectado: <span id="freq-val">—</span> Hz</div>
      </div>

      <div class="meter-wrap">
        <div class="meter-labels">
          <span>-50¢</span>
          <span>BEMOL</span>
          <span>0</span>
          <span>SUSTENIDO</span>
          <span>+50¢</span>
        </div>
        <div class="meter-track" id="meter-track">
          <div class="meter-center"></div>
          <div class="meter-fill" id="meter-fill"></div>
          <div class="meter-needle" id="meter-needle"></div>
        </div>
        <div class="cents-value" id="cents-val">— ¢</div>
      </div>

      <div class="status-badge idle" id="status-badge">Aguardando</div>
    </div>

    <!-- MIC BUTTON -->
    <button class="mic-btn" id="mic-btn" aria-label="Ativar microfone">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2a3 3 0 0 1 3 3v7a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
    </button>

    <!-- WAVEFORM VISUALIZER -->
    <div class="visualizer-wrap">
      <canvas id="visualizer"></canvas>
    </div>

    <div class="divider"></div>

    <!-- STRINGS -->
    <div class="strings-label">Cordas do Violão</div>
    <div class="strings-grid" id="strings-grid"></div>

    <div class="divider"></div>

    <!-- REFERENCE TONES -->
    <div class="ref-section">
      <div class="ref-header">Tom de Referência</div>
      <div class="ref-buttons" id="ref-buttons"></div>
    </div>

    <footer>Afinador Cromático · A4 = 440 Hz - V0.2</footer>
  </div>

  <script src="./app.js" />
    
</body>
</html>
